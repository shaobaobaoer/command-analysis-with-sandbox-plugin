# ============================================================================
#  评分配置文件 — 可调整预判引擎的判定阈值和权重
#
#  用法: 被 triage.sh 和 checker.sh 读取 (如果存在)
#
#  修改后重新运行 test_patterns.sh 验证准确率
# ============================================================================

# ─── 判定阈值 ────────────────────────────────────────────
# BLOCK: score >= BLOCK_THRESHOLD 或 (blacklisted && score >= BLOCK_BLACKLIST_THRESHOLD)
BLOCK_THRESHOLD=50
BLOCK_BLACKLIST_THRESHOLD=25

# REVIEW: score >= REVIEW_THRESHOLD 或 match_count > 0 或 blacklisted
REVIEW_THRESHOLD=10

# ─── 深度分析判定阈值 (checker.sh) ───────────────────────
# DANGEROUS: score >= DANGEROUS_THRESHOLD 或 criticals >= DANGEROUS_CRITICALS
DANGEROUS_THRESHOLD=60
DANGEROUS_CRITICALS=2

# SUSPICIOUS: score >= SUSPICIOUS_THRESHOLD 或 criticals >= 1
SUSPICIOUS_THRESHOLD=25

# LOW_RISK: score >= LOW_RISK_THRESHOLD
LOW_RISK_THRESHOLD=10

# ─── 合法命令降权 ────────────────────────────────────────
# 匹配合法模式时, 非 CRITICAL 发现的分数除以此值
LEGITIMATE_DIVISOR=2

# ─── 高熵阈值 ────────────────────────────────────────────
# Shannon 熵超过此值视为可疑 (0-8, 越高越随机)
ENTROPY_THRESHOLD=6.5

# ─── 隐藏进程容差 ────────────────────────────────────────
# /proc vs ps 差异超过此数量才告警 (避免竞态条件误报)
HIDDEN_PROC_TOLERANCE=10

# ─── C2 端口指纹 ─────────────────────────────────────────
# 逗号分隔的 C2 常见端口
C2_PORTS=4444,5555,6666,7777,8888,9999,1234,31337,12345,4443,8443,1337,6667,6697
